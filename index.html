    <!-- GitHub Pages SPA routing script -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the browser's
      // history using window.history.replaceState(...), to change the URL without
      // a page reload.
      // For example: https://www.foo.tld/?/one/two&a=b~and~c=d#e
      // Becomes: https://www.foo.tld/one/two?a=b&c=d#e

      // If you're creating a Project Pages site and NOT using a custom domain,
      // then set pathSegmentsToKeep to 1 (enterprise users may need to set it to > 1).
      // This is because Project Pages sites are served from a subdirectory of the username.github.io domain.
      // For example, if your GitHub Pages site is served from username.github.io/project-name/,
      // then you should set pathSegmentsToKeep to 1, since the project-name is the first path segment.
      var pathSegmentsToKeep = 1;

      var l = window.location;
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('?').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    </script>
